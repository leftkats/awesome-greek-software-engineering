# Greek tech & startup podcasts — source for greek-tech-podcasts.md (markdown) and podcasts.html (card UI).
# Contributors: add a new entry under `podcasts` with `title`, `description` (markdown), and `links`.
#
# Each link becomes a button on the site with an icon (Spotify, Apple Podcasts, YouTube, website, etc.).
# Use `anchor` for the short label on the button (optional; defaults to `label`).
#
# Example:
#   - title: My Show
#     description: |
#       [**My Show**](https://example.com/) is about …
#     links:
#       - label: Site
#         url: https://example.com/
#         anchor: example.com
#       - label: Spotify
#         url: https://open.spotify.com/show/...
#         anchor: Listen on Spotify

intro: |
  Hand-picked **video and audio shows** from Greece that often cover **technology, startups, product, and engineering**—useful listening next to the employer directory and job-search links in **[Job search & resources](search-queries-and-resources.md)**.

disclaimer: |
  **Disclaimer:** This list is community-maintained. Shows and links may change; verify on the official channels above.

podcasts:
  - title: "Μικρή Κουβέντα (Mikri Kouventa)"
    description: |
      [**Μικρή Κουβέντα**](https://mikrikouventa.fm/) (*Mikri Kouventa*) is a **video podcast** in Greek about technology, entrepreneurship, and current affairs. The project also publishes **Small Talk**, an English-language series with similar themes.
    links:
      - label: Site
        url: https://mikrikouventa.fm/
        anchor: mikrikouventa.fm
      - label: YouTube
        url: https://www.youtube.com/@mikrikouventa
        anchor: "@mikrikouventa"
      - label: Apple Podcasts
        url: https://podcasts.apple.com/gr/podcast/%CE%BC%CE%B9%CE%BA%CF%81%CE%AE-%CE%BA%CE%BF%CF%85%CE%B2%CE%AD%CE%BD%CF%84%CE%B1/id1490436652
        anchor: "Μικρή Κουβέντα (Greece)"
      - label: Spotify
        url: https://open.spotify.com/show/2jYxcClL09OtszEqIYyjPD
        anchor: Show

  - title: Hustle Hours
    description: |
      [**Hustle Hours**](https://www.hustlehours.com/) started as a podcast on youth entrepreneurship and grew into a **community for founders**: interviews, Startup School-style videos, and **events** connecting builders in Greece (and further afield).
    links:
      - label: Site
        url: https://www.hustlehours.com/
        anchor: hustlehours.com
      - label: YouTube
        url: https://www.youtube.com/@HustleHoursPodcast
        anchor: "@HustleHoursPodcast"
      - label: Spotify
        url: https://open.spotify.com/show/05k6BivafotwATAW0Icggc
        anchor: Hustle Hours on Spotify

  - title: Outliers
    description: |
      [**Outliers**](https://outliers.gr/el/) by **Endeavor Greece** spotlights standout founders: weekly conversations with people behind successful startups in Greece and abroad—journeys, lessons, and sector outlooks—with host **Panagiotis Karabinis** (CEO, Endeavor Greece). Episodes and notes also live on [outliers.gr](https://outliers.gr/el/).
    links:
      - label: Site
        url: https://outliers.gr/el/
        anchor: outliers.gr
      - label: YouTube
        url: https://www.youtube.com/playlist?list=PLQS4HLiwaedjymCMGokmBzQYk9bA_NOtt
        anchor: YouTube playlist
      - label: Spotify
        url: https://open.spotify.com/show/6B0xjt9pzbLwhmuELdImah
        anchor: Spotify
      - label: Apple Podcasts
        url: https://podcasts.apple.com/gr/podcast/outliers/id1540997257
        anchor: Apple Podcasts

  - title: SmartTalks
    description: |
      [**SmartTalks**](https://www.smarttalks.gr) from **[Infocom.gr](https://www.infocom.gr/)** and **Smartpress**—interviews on **technology, telecoms, and business**, hosted by journalist **Christos Kotsakas** (*Χρήστος Κοτσακάς*). Episodes are listed on [smarttalks.gr](https://www.smarttalks.gr).
    links:
      - label: Site
        url: https://www.smarttalks.gr
        anchor: smarttalks.gr
      - label: Apple Podcasts
        url: https://podcasts.apple.com/gr/podcast/smarttalks/id1694363227
        anchor: Apple Podcasts

  - title: "Hack U, με τον Μίλτο Μακρίδη"
    description: |
      [**Hack U, με τον Μίλτο Μακρίδη**](https://pod.gr/hack-u/) (*Hack U*) from **[pod.gr](https://pod.gr/)** explores how **digital culture and innovation** shape everyday life—AI, blockchain, and more—with host **Μίλτος Μακρίδης** (*Miltos Makridis*) and Greek researchers, founders, and makers.
    links:
      - label: Site
        url: https://pod.gr/hack-u/
        anchor: pod.gr
      - label: Spotify
        url: https://open.spotify.com/show/38vxk54B0cVcKelSV1ayDh
        anchor: Spotify
      - label: Apple Podcasts
        url: https://podcasts.apple.com/gr/podcast/hack-u/id1686388624
        anchor: Apple Podcasts
      - label: Podlist.gr
        url: https://podlist.gr/p/hack-u-me-ton-milto-makridi-671
        anchor: podlist.gr

  - title: AUEB Cast
    description: |
      [**AUEB Cast**](https://aueb-cast.simplecast.com/) is the **Athens University of Economics and Business** podcast: university life, news, and **science and business** topics (often in English)—from the school’s wider channel on [YouTube](https://www.youtube.com/playlist?list=PLLdBJrqWUK9oxmJ-ThUB0XUU6m6H4qBGQ).
    links:
