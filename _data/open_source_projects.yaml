# Greek-related open source on GitHub — feeds docs/open-source-projects.md (run `just readme`). Star/fork counts: `open_source_github_stats.yaml` via `just fetch-open-source-stats`.
# Add rows under `projects` with `title`, `url`, and `description` (markdown allowed; rendered as one line in the table).

intro: |
  Curated **open source** repositories on GitHub that are especially relevant in Greece—APIs for public services,
  translations, and tooling—plus notable projects from **Greek maintainers** (DevOps, web, audio, and more). Many rows
  were seeded from [committers.top Greece](https://committers.top/greece.html) (machine-readable
  [rank list](https://committers.top/rank_only/greece.json)): up to **two** public, non-fork repositories per ranked user
  (by stars), only if they have **at least one star or fork**, with descriptions taken from GitHub. Use them in your work
  or **contribute** issues, code, or docs.

projects:
  - title: Ergani Python SDK
    url: https://github.com/withlogicco/ergani-python-sdk
    description: >
      Python SDK for the Greek government **Ergani** API (employee workflows). Useful if you integrate with
      Ergani from Python; check the repo for contribution guidelines.

  - title: AADE myDATA (PHP)
    url: https://github.com/firebed/aade-mydata
    description: >
      PHP package for **ΑΑΔΕ myDATA** invoicing REST API—sending, cancelling, and requesting invoices, plus related
      methods. MIT-licensed; see the repository for docs and how to contribute.

  - title: Greek Python documentation (python-docs-el)
    url: https://github.com/python/python-docs-el/
    description: >
      Official **Python documentation** translated into Greek—collaboration via issues and pull requests on GitHub,
      coordinated with the wider translation effort.

  - title: Greek Legislation Wiki
    url: https://github.com/TeoMastro/Greek-Legislation-Wiki
    description: >
      LLM-assisted personal wiki for **Greek legislation**: PDF → Markdown (Docling), structured pages under `wiki/`,
      ingest/query/lint workflow, Obsidian-friendly. Useful if you work with legal text as data.

  - title: just-text (Greek laws in plain text)
    url: https://github.com/kafidas/just-text
    description: >
      **Greek laws** as published in the Government Gazette (FEK A’)—plain text extractions (no codification),
      sourced from the National Printing House; includes tooling such as `fekpdf2txt`. Dataset also on **Harvard Dataverse**
      ([DOI](https://doi.org/10.7910/DVN/F1CNFC)); **EPL-2.0**.

  - title: JSS-01 (JavaScript Software Synthesizer)
    url: https://github.com/michaelkolesidis/javascript-software-synthesizer
    description: >
      **JSS-01**—browser-based software synthesizer using the **Web Audio API** and modern JavaScript; interactive
      controls for learning and playing with synthesis in the open web.

  - title: Cherry Charm
